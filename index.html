<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>APPLE GAMING FF · TeraBox + Flezen Unlimited</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(circle at 5% 15%, #0a0c1a, #020408);
      font-family: 'Inter', sans-serif;
      color: #eef5ff;
      padding: 1.8rem 1.5rem;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    .gaming-header { text-align: center; margin-bottom: 2rem; }
    .brand {
      font-family: 'Orbitron', monospace;
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ff4d6d, #ffb347, #3bc9ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sub { color: #8f9bb5; margin-top: 5px; }
    .badge-group {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
      margin: 1rem 0 1.5rem;
    }
    .badge {
      background: rgba(0, 30, 50, 0.6);
      backdrop-filter: blur(6px);
      border-radius: 60px;
      padding: 0.3rem 1rem;
      font-size: 0.8rem;
      border: 1px solid #2dd4bf80;
    }
    .card {
      background: rgba(8, 18, 30, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid #2d3e6e;
      padding: 1.8rem;
      margin-bottom: 2rem;
    }
    .input-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .input-group input {
      flex: 1;
      background: #020a14;
      border: 1px solid #2c4a7a;
      border-radius: 3rem;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      color: white;
      outline: none;
    }
    .input-group input:focus { border-color: #0ff; box-shadow: 0 0 8px #0ff880; }
    .btn-primary {
      background: linear-gradient(95deg, #dc2f02, #ff7b2c);
      border: none;
      border-radius: 3rem;
      padding: 0.8rem 2rem;
      font-weight: 800;
      font-family: 'Orbitron';
      color: white;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: 0.2s;
    }
    .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 12px #ff7b2c; }
    .action-buttons {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      margin: 1.8rem 0 1rem;
    }
    .action-btn {
      background: #0b1622;
      border: 1px solid;
      border-radius: 60px;
      padding: 0.7rem 1.8rem;
      font-weight: bold;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    .play-btn { border-color: #facc15; color: #facc15; }
    .play-btn:hover:not(:disabled) { background: #facc1520; }
    .download-btn { border-color: #2dd4bf; color: #2dd4bf; }
    .download-btn:hover:not(:disabled) { background: #2dd4bf20; }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      background: #07121e99;
      border-radius: 1.5rem;
      padding: 1rem;
      text-align: center;
      font-size: 0.85rem;
      border-left: 3px solid #0ff;
      margin-top: 1rem;
    }
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.2rem;
      margin-top: 1.8rem;
    }
    .file-card {
      background: rgba(0, 0, 0, 0.6);
      border-radius: 1.2rem;
      padding: 1rem;
      border: 1px solid #2e497a;
    }
    .file-card:hover { border-color: #38bdf8; }
    .file-name { font-weight: 600; word-break: break-word; }
    .file-size { font-size: 0.7rem; color: #9bb5d9; margin: 0.3rem 0; }
    .card-buttons {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .small-btn {
      background: none;
      border: 1px solid #4b6e9e;
      border-radius: 40px;
      padding: 5px 12px;
      font-size: 0.7rem;
      cursor: pointer;
      color: #cbd5f0;
    }
    .small-btn:hover { background: #1e2f46; border-color: #90cdf4; }
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    .spinner {
      width: 46px;
      height: 46px;
      border: 3px solid #2dd4bf30;
      border-top: 3px solid #0ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(8px);
      z-index: 3000;
      justify-content: center;
      align-items: center;
    }
    .modal-inner {
      background: #0a101f;
      border-radius: 2rem;
      max-width: 90vw;
      max-height: 90vh;
      padding: 2rem;
      border: 1px solid #0ff;
      position: relative;
      text-align: center;
    }
    .close-modal {
      position: absolute;
      top: 8px;
      right: 15px;
      font-size: 2rem;
      cursor: pointer;
      color: white;
    }
    .footer {
      margin-top: 2rem;
      background: #050b1480;
      border-radius: 1.5rem;
      padding: 1rem;
      text-align: center;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="gaming-header">
    <div class="brand"><i class="fas fa-gamepad"></i> APPLE GAMING FF</div>
    <div class="sub">UNLIMITED TERABOX + FLEZEN DOWNLOADER & PLAYER</div>
    <div class="badge-group">
      <span class="badge"><i class="fab fa-fort-awesome"></i> TeraBox · No Limit</span>
      <span class="badge"><i class="fas fa-cloud-download-alt"></i> flezen.com · Full Extraction</span>
      <span class="badge"><i class="fas fa-infinity"></i> Unlimited Speed</span>
    </div>
  </div>

  <div class="card">
    <div class="input-group">
      <input type="text" id="linkInput" placeholder="Paste any TeraBox or flezen.com link ...">
      <button id="processBtn" class="btn-primary"><i class="fas fa-magic"></i> UNLOCK & PROCESS</button>
    </div>
    <div class="action-buttons">
      <button id="mainPlayBtn" class="action-btn play-btn" disabled><i class="fas fa-play-circle"></i> PLAY NOW</button>
      <button id="mainDownloadBtn" class="action-btn download-btn" disabled><i class="fas fa-download"></i> DOWNLOAD</button>
    </div>
    <div id="statusArea" class="status">
      <i class="fas fa-globe"></i> Ready. Paste link → auto‑detect platform → unlock unlimited files.
    </div>
    <div id="fileContainer"></div>
  </div>

  <div class="footer">
    <i class="fas fa-shield-alt"></i> Uses public APIs & CORS proxies. No data stored.
  </div>
</div>

<div id="previewModal" class="modal">
  <div class="modal-inner">
    <span class="close-modal" id="closeModalBtn">&times;</span>
    <div id="previewContent"></div>
    <button id="modalDownloadBtn" style="margin-top:16px; background:#1f3a4b; border:none; border-radius:40px; padding:10px 25px; color:#2dd4bf; cursor:pointer;"><i class="fas fa-download"></i> Download this file</button>
  </div>
</div>

<script>
  let currentFiles = [];

  // Elements
  const linkInput = document.getElementById("linkInput");
  const processBtn = document.getElementById("processBtn");
  const statusArea = document.getElementById("statusArea");
  const fileContainer = document.getElementById("fileContainer");
  const mainPlayBtn = document.getElementById("mainPlayBtn");
  const mainDownloadBtn = document.getElementById("mainDownloadBtn");
  const previewModal = document.getElementById("previewModal");
  const closeModalBtn = document.getElementById("closeModalBtn");

  processBtn.addEventListener("click", processLink);
  closeModalBtn.addEventListener("click", () => previewModal.style.display = "none");
  mainPlayBtn.addEventListener("click", () => openPreview(currentFiles[0]));
  mainDownloadBtn.addEventListener("click", () => window.open(currentFiles[0].download_link, "_blank"));

  async function processLink() {
    const url = linkInput.value.trim();
    if (!url) {
      showStatus("Please enter a link!", "error");
      return;
    }

    setLoading(true);
    try {
      // Logic for fetching (Simulated for this demo, replace with real API calls)
      let platform = url.includes("terabox") ? "TeraBox" : "Flezen";
      
      // Example Data (Replace this with real Fetch call)
      const mockFiles = [
        { name: "Game_Video.mp4", size: 104857600, download_link: url },
        { name: "Setup_File.zip", size: 524288000, download_link: url }
      ];

      currentFiles = mockFiles;
      renderFileList(currentFiles);
      enableMainButtons(true);
      showStatus(`✅ Successfully unlocked ${platform} files!`, "success");
    } catch (err) {
      showStatus("❌ Failed to process link.", "error");
    } finally {
      setLoading(false);
    }
  }

  function renderFileList(files) {
    fileContainer.innerHTML = "";
    const grid = document.createElement("div");
    grid.className = "file-grid";

    files.forEach((file, index) => {
      const card = document.createElement("div");
      card.className = "file-card";
      card.innerHTML = `
        <div class="file-name"><i class="fas fa-file"></i> ${file.name}</div>
        <div class="file-size">${(file.size / (1024 * 1024)).toFixed(2)} MB</div>
        <div class="card-buttons">
          <button class="small-btn" onclick="window.open('${file.download_link}', '_blank')">Download</button>
          <button class="small-btn" onclick="openPreviewByIndex(${index})">Preview</button>
        </div>
      `;
      grid.appendChild(card);
    });
    fileContainer.appendChild(grid);
  }

  window.openPreviewByIndex = (index) => openPreview(currentFiles[index]);

  function openPreview(file) {
    const content = document.getElementById("previewContent");
    content.innerHTML = `<h3>Previewing: ${file.name}</h3><p>Video/Player would load here for ${file.name}</p>`;
    previewModal.style.display = "flex";
  }

  function showStatus(msg, type) {
    statusArea.innerHTML = msg;
    statusArea.style.color = type === "error" ? "#ff4d6d" : "#2dd4bf";
  }

  function setLoading(isLoading) {
    processBtn.disabled = isLoading;
    processBtn.innerHTML = isLoading ? '<i class="fas fa-spinner fa-spin"></i> Processing...' : '<i class="fas fa-magic"></i> UNLOCK & PROCESS';
  }

  function enableMainButtons(enabled) {
    mainPlayBtn.disabled = !enabled;
    mainDownloadBtn.disabled = !enabled;
  }
</script>

</body>
</html>
