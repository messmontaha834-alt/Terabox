<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPLE GAMING FF · Multi-File Downloader</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020408;
      font-family: 'Inter', sans-serif;
      color: #eef5ff;
      padding: 1.5rem;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 2rem; }
    .brand { font-family: 'Orbitron'; font-size: 2rem; color: #3bc9ff; text-shadow: 0 0 10px #3bc9ff; }
    
    .input-card {
      background: rgba(8, 18, 30, 0.8);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid #2d3e6e;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 12px;
      background: #000;
      border: 1px solid #2c4a7a;
      color: #fff;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .btn-main {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, #ff4d6d, #ffb347);
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Orbitron';
    }

    #status { text-align: center; margin: 10px 0; font-size: 0.9rem; }

    /* File List Styling */
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }
    .file-card {
      background: #0b1622;
      border: 1px solid #2e497a;
      border-radius: 12px;
      padding: 15px;
      transition: 0.3s;
    }
    .file-card:hover { border-color: #3bc9ff; }
    .file-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 10px; color: #fff; word-break: break-all; }
    .file-actions { display: flex; gap: 10px; }
    .btn-sm {
      flex: 1;
      padding: 8px;
      border-radius: 5px;
      text-align: center;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-preview { background: #3bc9ff; color: #000; }
    .btn-dl { background: #2dd4bf; color: #000; }

    /* Modal for Preview */
    .modal {
      display: none;
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.9);
      z-index: 999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    video { width: 90%; max-width: 800px; border-radius: 10px; }
    .close-btn { color: white; margin-bottom: 10px; cursor: pointer; font-size: 1.5rem; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="brand">APPLE GAMING FF</div>
    <p>TeraBox & Flezen Folder/File Explorer</p>
  </div>

  <div class="input-card">
    <input type="text" id="targetLink" placeholder="Paste Flezen or TeraBox link here...">
    <button class="btn-main" onclick="processLink()">FETCH FILES</button>
    <div id="status">Ready...</div>
  </div>

  <div id="fileList" class="file-grid">
    </div>
</div>

<div id="previewModal" class="modal">
  <div class="close-btn" onclick="closePreview()">✖ Close Preview</div>
  <video id="previewPlayer" controls></video>
</div>

<script>
  async function processLink() {
    const link = document.getElementById('targetLink').value.trim();
    const status = document.getElementById('status');
    const list = document.getElementById('fileList');
    
    if(!link) return alert("Please enter a link!");

    status.innerHTML = "🔍 Scanning link for files... Please wait.";
    list.innerHTML = ""; // Clear previous

    try {
      // Proxy and API for Folder/File Extraction
      const proxy = "https://api.allorigins.win/get?url=";
      const response = await fetch(proxy + encodeURIComponent(link));
      const data = await response.json();
      const html = data.contents;

      // Extracting links (Simple logic for demonstration)
      // This will look for video tags, source tags or common file extensions
      const regex = /https?:\/\/[^\s"'<>]+(?:\.mp4|\.mkv|\.zip|\.rar|\.pdf)/gi;
      let matches = html.match(regex) || [];
      
      // Filter out duplicates
      let uniqueLinks = [...new Set(matches)];

      if(uniqueLinks.length === 0) {
        // Fallback for TeraBox via API
        const apiResp = await fetch(`https://terabox-dl.vercel.app/api?url=${encodeURIComponent(link)}`);
        const apiData = await apiResp.json();
        if(apiData.files) {
          apiData.files.forEach(file => {
            createFileCard(file.name || "TeraBox File", file.direct_link || file.download_link);
          });
        } else {
          status.innerHTML = "❌ No direct files found. Try a single file link.";
        }
      } else {
        uniqueLinks.forEach((fileUrl, index) => {
          let name = "File " + (index + 1);
          createFileCard(name, fileUrl);
        });
        status.innerHTML = "✅ Found " + uniqueLinks.length + " file(s)!";
      }

    } catch (err) {
      status.innerHTML = "❌ Failed to fetch. Make sure the link is public.";
      console.error(err);
    }
  }

  function createFileCard(name, url) {
    const list = document.getElementById('fileList');
    const card = document.createElement('div');
    card.className = 'file-card';
    card.innerHTML = `
      <div class="file-name">${name}</div>
      <div class="file-actions">
        <button class="btn-sm btn-preview" onclick="openPreview('${url}')">Preview</button>
        <a href="${url}" class="btn-sm btn-dl" target="_blank">Download</a>
      </div>
    `;
    list.appendChild(card);
  }

  function openPreview(url) {
    const modal = document.getElementById('previewModal');
    const player = document.getElementById('previewPlayer');
    player.src = url;
    modal.style.display = 'flex';
    player.play();
  }

  function closePreview() {
    const modal = document.getElementById('previewModal');
    const player = document.getElementById('previewPlayer');
    player.pause();
    modal.style.display = 'none';
  }
</script>

</body>
</html>
