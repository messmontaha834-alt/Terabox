<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>APPLE GAMING FF · TeraBox + Flezen Player</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(circle at 5% 15%, #0a0c1a, #020408);
      font-family: 'Inter', sans-serif;
      color: #eef5ff;
      padding: 1.5rem;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    .gaming-header { text-align: center; margin-bottom: 2rem; }
    .brand {
      font-family: 'Orbitron', monospace;
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ff4d6d, #3bc9ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .card {
      background: rgba(8, 18, 30, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      border: 1px solid #2d3e6e;
      padding: 1.5rem;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    input {
      background: #020a14;
      border: 1px solid #2c4a7a;
      border-radius: 10px;
      padding: 1rem;
      color: white;
      font-size: 1rem;
    }
    .btn-primary {
      background: linear-gradient(95deg, #dc2f02, #ff7b2c);
      border: none;
      border-radius: 10px;
      padding: 1rem;
      font-weight: 800;
      color: white;
      cursor: pointer;
      font-family: 'Orbitron';
    }
    #playerContainer {
      margin-top: 2rem;
      display: none;
      text-align: center;
    }
    video {
      width: 100%;
      border-radius: 15px;
      border: 2px solid #3bc9ff;
      background: #000;
    }
    .download-section {
      margin-top: 1rem;
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .dl-btn {
      background: #2dd4bf;
      color: #000;
      padding: 10px 20px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
    }
    .status { margin-top: 10px; font-size: 0.9rem; text-align: center; }
  </style>
</head>
<body>

<div class="container">
  <div class="gaming-header">
    <div class="brand">APPLE GAMING FF</div>
    <div class="sub">VIDEO PREVIEW & DOWNLOADER</div>
  </div>

  <div class="card">
    <div class="input-group">
      <input type="text" id="videoLink" placeholder="Paste TeraBox or Flezen link here...">
      <button id="startBtn" class="btn-primary">GET VIDEO & PREVIEW</button>
    </div>
    <div id="statusArea" class="status"></div>
  </div>

  <div id="playerContainer">
    <h3 id="videoTitle" style="margin-bottom: 10px;">Video Preview</h3>
    <video id="mainPlayer" controls>
      Your browser does not support the video tag.
    </video>
    <div class="download-section">
      <a href="#" id="finalDownload" class="dl-btn" target="_blank">📥 DOWNLOAD VIDEO</a>
    </div>
  </div>
</div>

<script>
  const startBtn = document.getElementById('startBtn');
  const videoLink = document.getElementById('videoLink');
  const playerContainer = document.getElementById('playerContainer');
  const mainPlayer = document.getElementById('mainPlayer');
  const finalDownload = document.getElementById('finalDownload');
  const statusArea = document.getElementById('statusArea');

  startBtn.addEventListener('click', async () => {
    const url = videoLink.value.trim();
    if(!url) return alert("Please paste a link!");

    statusArea.innerHTML = "🔍 Extracting video link... Please wait.";
    statusArea.style.color = "#3bc9ff";
    
    try {
      // আমরা এখানে একটি পাবলিক এপিআই প্রক্সি ব্যবহার করছি ভিডিও লিঙ্কটি বের করার জন্য
      // TeraBox বা Flezen-এর ক্ষেত্রে সরাসরি ভিডিও সোর্স লাগে
      const response = await fetch(`https://terabox-dl.vercel.app/api?url=${encodeURIComponent(url)}`);
      const data = await response.json();

      if (data && data.status === "success" || data.files) {
        const videoSrc = data.files[0].direct_link || data.files[0].download_link;
        
        // ভিডিও প্লেয়ারে সোর্স সেট করা
        mainPlayer.src = videoSrc;
        finalDownload.href = videoSrc;
        
        // প্লেয়ার দেখানো
        playerContainer.style.display = "block";
        statusArea.innerHTML = "✅ Video found! You can preview and download now.";
        statusArea.style.color = "#2dd4bf";
        
        // অটোমেটিক স্ক্রোল টু ভিডিও
        playerContainer.scrollIntoView({ behavior: 'smooth' });
      } else {
        throw new Error("Could not find video file.");
      }
    } catch (error) {
      statusArea.innerHTML = "❌ Error: Could not fetch video. Make sure the link is public.";
      statusArea.style.color = "#ff4d6d";
      console.error(error);
    }
  });
</script>

</body>
</html>
